  <style>
/* ============== PALUGADA Design System ============== */

@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* Warm cream + earth palette */
  --cream-50:  #FAF6EC;
  --cream-100: #F4ECD8;
  --cream-200: #E9DCBE;
  --cream-300: #D9C89A;

  --clay-500: #C8593A;
  --clay-600: #B0431F;
  --clay-700: #8C3214;
  --clay-100: #F6E0D4;

  --palm-600: #3F6B47;
  --palm-700: #2E5034;
  --palm-800: #1E3622;
  --palm-100: #DCE7DC;

  --ochre-400: #D9A957;
  --ochre-500: #C28A2F;
  --ochre-600: #9D6C1E;

  --ink-900: #241B0E;
  --ink-700: #4F3F26;
  --ink-500: #8B7553;
  --ink-300: #BDAC8A;

  --line: rgba(36,27,14,0.10);
  --line-strong: rgba(36,27,14,0.18);

  /* Tokens */
  --bg: var(--cream-50);
  --surface: #FFFCF4;
  --surface-2: var(--cream-100);
  --primary: var(--clay-600);
  --primary-hover: var(--clay-700);
  --secondary: var(--palm-700);
  --accent: var(--ochre-500);

  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;

  --shadow-sm: 0 1px 2px rgba(36,27,14,0.05), 0 1px 1px rgba(36,27,14,0.04);
  --shadow:    0 4px 14px rgba(36,27,14,0.08), 0 1px 2px rgba(36,27,14,0.04);
  --shadow-lg: 0 24px 60px rgba(36,27,14,0.14), 0 8px 18px rgba(36,27,14,0.06);

  --font-display: "Newsreader", Georgia, serif;
  --font-ui: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  background: var(--bg);
  color: var(--ink-900);
  font-family: var(--font-ui);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: inherit; text-decoration: none; }

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
}

input, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

img { display: block; max-width: 100%; }

::selection { background: var(--ochre-400); color: var(--ink-900); }

.app-root {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---- Type ---- */
.display { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.01em; }
.mono { font-family: var(--font-mono); font-feature-settings: "ss01"; }
.label-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-500);
  font-weight: 500;
}

/* ---- Buttons ---- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.15s ease;
  white-space: nowrap;
}
.btn-primary {
  background: var(--primary);
  color: #FFFCF4;
  box-shadow: 0 1px 0 rgba(140,50,20,0.4) inset, 0 2px 6px rgba(140,50,20,0.18);
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-secondary {
  background: var(--cream-100);
  color: var(--ink-900);
  border: 1px solid var(--line);
}
.btn-secondary:hover { background: var(--cream-200); }
.btn-ghost {
  background: transparent;
  color: var(--ink-700);
}
.btn-ghost:hover { background: var(--cream-100); }
.btn-sm { padding: 6px 12px; font-size: 13px; }
.btn-lg { padding: 14px 24px; font-size: 15px; }

.btn-wa {
  background: #25D366;
  color: white;
}
.btn-wa:hover { background: #1faa54; }

/* ---- Inputs ---- */
.input, .select {
  height: 40px;
  padding: 0 14px;
  border-radius: 10px;
  border: 1px solid var(--line-strong);
  background: var(--surface);
  color: var(--ink-900);
  outline: none;
  transition: border 0.15s, box-shadow 0.15s;
  width: 100%;
}
.input:focus, .select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(176,67,31,0.12);
}
.textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid var(--line-strong);
  background: var(--surface);
  outline: none;
  resize: vertical;
  min-height: 80px;
}
.textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(176,67,31,0.12);
}

/* ---- Layout ---- */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
}
.container-narrow {
  max-width: 980px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ---- Header ---- */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(250,246,236,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}
.header-inner {
  display: flex;
  align-items: center;
  gap: 24px;
  height: 68px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 22px;
  letter-spacing: -0.01em;
  color: var(--ink-900);
}
.brand-mark {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--primary);
  display: grid;
  place-items: center;
  color: var(--cream-50);
  position: relative;
  overflow: hidden;
}
.brand-mark::before, .brand-mark::after {
  content: "";
  position: absolute;
  background: var(--ochre-400);
}
.brand-mark::before {
  inset: 6px; border-radius: 6px; background: transparent;
  border: 1.5px solid var(--ochre-400);
}
.brand-mark::after {
  width: 8px; height: 8px; border-radius: 50%;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
}
.brand small {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-500);
  font-weight: 500;
  display: block;
  margin-top: -2px;
}

.header-nav {
  display: flex;
  gap: 4px;
  margin-left: 8px;
}
.header-nav a {
  padding: 8px 14px;
  border-radius: 8px;
  color: var(--ink-700);
  font-weight: 500;
  font-size: 14px;
}
.header-nav a:hover, .header-nav a.active {
  background: var(--cream-100);
  color: var(--ink-900);
}

.search-box {
  position: relative;
  flex: 1;
  max-width: 520px;
}
.search-box .input {
  padding-left: 42px;
  background: var(--cream-100);
  border-color: transparent;
}
.search-box .input:focus { background: var(--surface); }
.search-box svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-500);
}

/* ---- Cards ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
  border-color: var(--line-strong);
}

.product-card {
  cursor: pointer;
  display: flex;
  flex-direction: column;
}
.product-card .thumb {
  aspect-ratio: 4/3;
  background: var(--cream-200);
  position: relative;
  overflow: hidden;
}
.product-card .badge {
  position: absolute;
  top: 10px;
  left: 10px;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(255,252,244,0.92);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-700);
  font-weight: 600;
}
.product-card .fav {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255,252,244,0.92);
  display: grid;
  place-items: center;
  color: var(--clay-600);
}
.product-card .body {
  padding: 14px 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.product-card .cat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--palm-700);
  font-weight: 600;
}
.product-card h3 {
  margin: 2px 0 0;
  font-size: 16px;
  font-weight: 600;
  line-height: 1.25;
  color: var(--ink-900);
}
.product-card .owner {
  color: var(--ink-500);
  font-size: 13px;
  margin-top: 6px;
}
.product-card .price-row {
  margin-top: 10px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.product-card .price {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--clay-700);
}
.product-card .clicks {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--ink-500);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

/* Placeholder thumb */
.thumb-placeholder {
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(135deg,
      var(--cream-200) 0px, var(--cream-200) 10px,
      var(--cream-100) 10px, var(--cream-100) 20px);
  display: flex;
  align-items: center;
  justify-content: center;
}
.thumb-placeholder span {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-500);
  background: rgba(255,252,244,0.88);
  padding: 4px 10px;
  border-radius: 4px;
}

/* ---- Hero / Section heads ---- */
.section {
  padding: 56px 0;
}
.section-tight { padding: 36px 0; }
.section-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
}
.section-head h2 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 32px;
  line-height: 1.1;
  letter-spacing: -0.015em;
  margin: 0;
  color: var(--ink-900);
}
.section-head p {
  margin: 6px 0 0;
  color: var(--ink-500);
  max-width: 540px;
}
.section-head .more {
  color: var(--clay-700);
  font-weight: 600;
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

/* ---- Grid ---- */
.grid {
  display: grid;
  gap: 18px;
}
.grid-products {
  grid-template-columns: repeat(4, 1fr);
}
@media (max-width: 980px) {
  .grid-products { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 520px) {
  .grid-products { grid-template-columns: 1fr; }
}

/* ---- Chips ---- */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--line);
  font-size: 13px;
  color: var(--ink-700);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--line-strong); }
.chip.active {
  background: var(--ink-900);
  color: var(--cream-50);
  border-color: var(--ink-900);
}
.chip.tonal {
  background: var(--clay-100);
  color: var(--clay-700);
  border-color: transparent;
}
.chip.palm {
  background: var(--palm-100);
  color: var(--palm-700);
  border-color: transparent;
}

/* ---- Pills (filter chips with x) ---- */
.pill-x {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 4px 4px 12px;
  background: var(--ink-900);
  color: var(--cream-50);
  border-radius: 999px;
  font-size: 13px;
}
.pill-x button {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  color: var(--cream-50);
  display: grid; place-items: center;
  font-size: 14px;
  line-height: 1;
}

/* ---- Sidebar ---- */
.sidebar {
  padding: 22px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
}
.sidebar h4 {
  margin: 0 0 12px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--ink-900);
}
.filter-group {
  padding: 16px 0;
  border-bottom: 1px solid var(--line);
}
.filter-group:last-child { border-bottom: none; }
.filter-group:first-child { padding-top: 4px; }

.check-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  cursor: pointer;
  font-size: 14px;
  color: var(--ink-700);
}
.check-row input[type="checkbox"], .check-row input[type="radio"] {
  width: 16px; height: 16px;
  accent-color: var(--primary);
}
.check-row .count {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-500);
}

/* ---- Breadcrumb ---- */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--ink-500);
  margin-bottom: 16px;
}
.breadcrumb a:hover { color: var(--ink-900); }
.breadcrumb .sep { color: var(--ink-300); }

/* ---- Map placeholder ---- */
.map-frame {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--line);
  background:
    radial-gradient(circle at 30% 40%, rgba(63,107,71,0.12), transparent 50%),
    radial-gradient(circle at 70% 60%, rgba(217,169,87,0.12), transparent 50%),
    var(--palm-100);
}
.map-frame::before {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(46,80,52,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(46,80,52,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
}
.map-frame::after {
  content: "";
  position: absolute;
  top: 12%; left: 8%; right: 8%; bottom: 18%;
  background:
    radial-gradient(circle, rgba(255,252,244,0.7) 0%, transparent 60%);
  border-radius: 30% 60% 50% 40%;
}
.map-frame .road {
  position: absolute;
  background: rgba(255,252,244,0.8);
  border: 1px solid rgba(46,80,52,0.15);
}
.map-pin {
  position: absolute;
  z-index: 2;
  width: 30px; height: 30px;
  transform: translate(-50%, -100%);
}
.map-pin .dot {
  position: absolute;
  inset: 0;
  background: var(--clay-600);
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  box-shadow: 0 4px 10px rgba(176,67,31,0.4);
}
.map-pin .ring {
  position: absolute;
  top: 50%; left: 50%;
  width: 8px; height: 8px;
  background: var(--cream-50);
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

/* ---- Tag ---- */
.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 600;
}
.tag-palm { background: var(--palm-100); color: var(--palm-700); }
.tag-clay { background: var(--clay-100); color: var(--clay-700); }
.tag-ochre { background: rgba(217,169,87,0.2); color: var(--ochre-600); }
.tag-ink { background: var(--cream-200); color: var(--ink-700); }

/* ---- Tabs ---- */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 24px;
}
.tabs button {
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-500);
  position: relative;
  margin-bottom: -1px;
}
.tabs button.active {
  color: var(--ink-900);
  font-weight: 600;
}
.tabs button.active::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 2px;
  background: var(--primary);
}

/* ---- Toast ---- */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink-900);
  color: var(--cream-50);
  padding: 12px 20px;
  border-radius: 999px;
  font-size: 14px;
  z-index: 200;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ---- Modal ---- */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(36,27,14,0.4);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: grid;
  place-items: center;
  padding: 24px;
}
.modal {
  background: var(--surface);
  border-radius: var(--radius-xl);
  max-width: 480px;
  width: 100%;
  padding: 28px;
  box-shadow: var(--shadow-lg);
}
.modal h3 {
  margin: 0 0 8px;
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 500;
}

/* ---- Footer ---- */
.footer {
  margin-top: auto;
  background: var(--palm-800);
  color: var(--cream-100);
  padding: 56px 0 32px;
}
.footer a { color: var(--cream-200); }
.footer a:hover { color: var(--cream-50); }
.footer-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
  gap: 32px;
  margin-bottom: 40px;
}
@media (max-width: 768px) {
  .footer-grid { grid-template-columns: 1fr 1fr; }
}
.footer h5 {
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: var(--font-mono);
  color: var(--cream-300);
  margin: 0 0 14px;
  font-weight: 600;
}
.footer ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.footer-bottom {
  border-top: 1px solid rgba(255,252,244,0.1);
  padding-top: 24px;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--cream-300);
}

/* ---- Decorative batik motif ---- */
.batik-strip {
  height: 8px;
  background:
    repeating-linear-gradient(90deg,
      var(--clay-600) 0 18px,
      var(--ochre-500) 18px 30px,
      var(--palm-700) 30px 48px,
      var(--cream-200) 48px 56px);
}

/* ---- Admin layout ---- */
.admin-shell {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
  background: var(--cream-50);
}
.admin-sidebar {
  background: var(--ink-900);
  color: var(--cream-100);
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.admin-sidebar .brand { color: var(--cream-50); margin-bottom: 24px; padding: 0 8px; }
.admin-sidebar .brand small { color: var(--cream-300); }
.admin-nav-item {

      <div className="body">
        <div className="cat-label">{item.category}</div>

        <div className="price-row">

            {item.clickCount}

  );

(function(){
/* global React, PalComponents, PALUGADA_DATA */
const { useState: useS_cat, useMemo: useM_cat } = React;

function Catalog({ params }) {
  const D = window.PALUGADA_DATA;
  const { Icon, Catalogcard } = window.PalComponents;

  const [type, setType] = useS_cat(params.type || 'product');
  const [q, setQ] = useS_cat(params.q || '');
  const [categories, setCategories] = useS_cat([]);
  const [areas, setAreas] = useS_cat([]);
  const [priceRange, setPriceRange] = useS_cat('all');
  const [sortBy, setSortBy] = useS_cat('newest');
  const [hasMarketplace, setHasMarketplace] = useS_cat(false);
  const [availability, setAvailability] = useS_cat('all');
  const [isNegotiable, setIsNegotiable] = useS_cat(false);
  const [hasPortfolio, setHasPortfolio] = useS_cat(false);

  const items = useM_cat(() => {
    let pool = type === 'product' ? D.products : D.services;
    pool = pool.map(it => ({ ...it, _biz: D.findBusiness(it.businessId) }));
    if (q.trim()) {
      const qq = q.toLowerCase();
      pool = pool.filter(it =>
        it.name.toLowerCase().includes(qq) ||
        it._biz.name.toLowerCase().includes(qq) ||
        it.category.toLowerCase().includes(qq)
      );
    }
    if (categories.length) pool = pool.filter(it => categories.includes(it.category));
    if (areas.length) pool = pool.filter(it => areas.includes(it._biz.area));
    if (type === 'product') {
      if (priceRange === 'lt50') pool = pool.filter(it => it.price < 50000);
      if (priceRange === '50-100') pool = pool.filter(it => it.price >= 50000 && it.price < 100000);
      if (priceRange === 'gt100') pool = pool.filter(it => it.price >= 100000);
      if (hasMarketplace) pool = pool.filter(it => it.hasMarketplace);
    } else {
      if (availability !== 'all') pool = pool.filter(it => it.availability === availability);
      if (isNegotiable) pool = pool.filter(it => it.isNegotiable);
      if (hasPortfolio) pool = pool.filter(it => it.hasPortfolio);
    }
    if (sortBy === 'most_viewed') pool.sort((a, b) => b.clickCount - a.clickCount);
    return pool;
  }, [type, q, categories, areas, priceRange, sortBy, hasMarketplace, availability, isNegotiable, hasPortfolio]);

  const catList = type === 'product' ? D.productCategories : D.serviceCategories;

  const activeFilters = [];
  if (q) activeFilters.push({ k: 'q', l: `"${q}"`, clear: () => setQ('') });
  categories.forEach(c => activeFilters.push({ k: 'c-' + c, l: c, clear: () => setCategories(cs => cs.filter(x => x !== c)) }));
  areas.forEach(a => activeFilters.push({ k: 'a-' + a, l: a, clear: () => setAreas(as => as.filter(x => x !== a)) }));
  if (priceRange !== 'all') activeFilters.push({ k: 'pr', l: `Harga: ${priceRange}`, clear: () => setPriceRange('all') });
  if (hasMarketplace) activeFilters.push({ k: 'mp', l: 'Ada marketplace', clear: () => setHasMarketplace(false) });
  if (availability !== 'all') activeFilters.push({ k: 'av', l: availability, clear: () => setAvailability('all') });
  if (isNegotiable) activeFilters.push({ k: 'ng', l: 'Bisa nego', clear: () => setIsNegotiable(false) });
  if (hasPortfolio) activeFilters.push({ k: 'pf', l: 'Ada portfolio', clear: () => setHasPortfolio(false) });

  return (
    <main className="container" style={{ padding: '32px 24px 80px' }}>
      <div className="breadcrumb">
        <a onClick={(e) => { e.preventDefault(); window.navigate('home'); }} href="#">Beranda</a>
        <span className="sep">›</span>
        <span>{type === 'product' ? 'Produk UMKM' : 'Layanan Jasa'}</span>
        {categories.length === 1 && <><span className="sep">›</span><span>{categories[0]}</span></>}
      </div>

      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap', marginBottom: 24 }}>
        <div>
          <h1 className="display" style={{ fontSize: 40, margin: 0, lineHeight: 1.1, letterSpacing: '-0.015em', fontWeight: 500 }}>
            {type === 'product' ? 'Produk UMKM Banjarsari' : 'Layanan Jasa Banjarsari'}
          </h1>
          <p style={{ color: 'var(--ink-500)', margin: '6px 0 0', fontSize: 15 }}>
            Menampilkan <strong style={{ color: 'var(--ink-900)' }}>{items.length} {type === 'product' ? 'produk' : 'jasa'}</strong>
            {q && <> untuk pencarian "{q}"</>}
          </p>
        </div>
        <div style={{ display: 'flex', gap: 4, background: 'var(--cream-100)', padding: 4, borderRadius: 999 }}>
          <button
            onClick={() => setType('product')}
            className="btn btn-sm"

const FakeChart = () => {
  const w = 100, h = 40;
  const dataA = [12, 18, 16, 24, 21, 28, 26, 32, 30, 35, 38, 42, 40, 48, 52, 50, 55, 58, 62, 60, 66, 70, 74, 72, 78, 82, 85, 88, 92, 94];
  const dataB = [8, 11, 9, 14, 13, 18, 17, 21, 20, 24, 26, 28, 27, 33, 36, 35, 38, 41, 44, 43, 47, 50, 53, 51, 56, 58, 61, 63, 66, 68];
  const max = Math.max(...dataA);
  const toPath = (arr) => arr.map((v, i) => `${i === 0 ? 'M' : 'L'} ${(i/(arr.length-1))*w} ${h - (v/max)*h*0.92}`).join(' ');
  const toArea = (arr) => `${toPath(arr)} L ${w} ${h} L 0 ${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: '100%', height: 200 }}>
      <defs>
        <linearGradient id="g1" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="#C8593A" stopOpacity="0.3"/>
          <stop offset="100%" stopColor="#C8593A" stopOpacity="0"/>
        </linearGradient>
        <linearGradient id="g2" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="#3F6B47" stopOpacity="0.25"/>
          <stop offset="100%" stopColor="#3F6B47" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={toArea(dataA)} fill="url(#g1)" />
      <path d={toPath(dataA)} fill="none" stroke="#C8593A" strokeWidth="0.6" />
      <path d={toArea(dataB)} fill="url(#g2)" />
      <path d={toPath(dataB)} fill="none" stroke="#3F6B47" strokeWidth="0.6" />
    </svg>
  );
};

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

})();


const { useState, useEffect, useMemo } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "homeVariant": "A",
      "accent": "clay",
      "showPbiTags": true
    }/*EDITMODE-END*/;

    const ACCENTS = {
      clay:  { '--primary': '#B0431F', '--primary-hover': '#8C3214', '--clay-100': '#F6E0D4' },
      palm:  { '--primary': '#2E5034', '--primary-hover': '#1E3622', '--clay-100': '#DCE7DC' },
      ochre: { '--primary': '#9D6C1E', '--primary-hover': '#7A521A', '--clay-100': 'rgba(217,169,87,0.18)' },
    };

    function App() {
      const [route, setRoute] = useState('home');
      const [params, setParams] = useState({});
      const [search, setSearch] = useState('');
      const [toast, setToast] = useState(null);
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

      // Router
      window.navigate = (r, p = {}) => {
        setRoute(r); setParams(p);
        if (p.q) setSearch(p.q);
        window.scrollTo({ top: 0, behavior: 'instant' });
        history.replaceState(null, '', '#' + r + (Object.keys(p).length ? '?' + new URLSearchParams(Object.fromEntries(Object.entries(p).filter(([k,v]) => typeof v !== 'object'))).toString() : ''));
      };
      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2400); };

      // Init from hash
      useEffect(() => {
        const m = location.hash.match(/^#([\w-]+)(?:\?(.+))?/);
        if (m) {
          const p = m[2] ? Object.fromEntries(new URLSearchParams(m[2])) : {};
          setRoute(m[1]); setParams(p);
        }
      }, []);

      // Apply accent tweak
      useEffect(() => {
        const a = ACCENTS[tweaks.accent] || ACCENTS.clay;
        const root = document.documentElement;
        Object.entries(a).forEach(([k, v]) => root.style.setProperty(k, v));
      }, [tweaks.accent]);

      // Hide PBI tags?
      useEffect(() => {
        if (tweaks.showPbiTags) {
          document.documentElement.style.removeProperty('--pbi-display');
          const style = document.getElementById('pbi-toggle-style');
          if (style) style.remove();
        } else {
          let style = document.getElementById('pbi-toggle-style');
          if (!style) {
            style = document.createElement('style');
            style.id = 'pbi-toggle-style';
            style.textContent = '.label-eyebrow:has-text("PBI") { display: none; }';
            // simpler: hide eyebrows that start with PBI
            style.textContent = '.label-eyebrow { font-size: 0 !important; height: 0 !important; margin: 0 !important; overflow: hidden; }';
            document.head.appendChild(style);
          }
        }
      }, [tweaks.showPbiTags]);

      const { Header, Footer } = window.PalChrome || {};
      const isAdmin = route.startsWith('admin');
      const openEdit = (entity, item = null) => {
        setRoute('admin-edit'); setParams({ entity, item });
      };

      const S = window.PalScreens;

      let content;
      if (route === 'home') content = <S.Home variant={tweaks.homeVariant} />;
      else if (route === 'catalog') content = <S.Catalog params={params} />;
      else if (route === 'product-detail') content = <S.ProductDetail params={params} showToast={showToast} />;
      else if (route === 'service-detail') content = <S.ServiceDetail params={params} showToast={showToast} />;
      else if (route === 'business') content = <S.BusinessProfile params={params} showToast={showToast} />;
      else if (route === 'admin-dashboard') content = <S.AdminDashboard />;
      else if (route === 'admin-master-business') content = <S.AdminMasterData entity="business" openEdit={openEdit} />;
      else if (route === 'admin-master-product') content = <S.AdminMasterData entity="product" openEdit={openEdit} />;
      else if (route === 'admin-master-service') content = <S.AdminMasterData entity="service" openEdit={openEdit} />;
      else if (route === 'admin-edit') content = <S.AdminEdit params={params} showToast={showToast} />;
      else content = <S.Home />;

      return (
        <div className="app-root" data-screen-label={route}>
          {!isAdmin && Header && <Header route={route} search={search} setSearch={setSearch} />}
          {content}
          {!isAdmin && Footer && <Footer />}
          {toast && <div className="toast">{toast}</div>}
          <window.TweaksPanel title="PALUGADA Tweaks">
            <window.TweakSection label="Halaman Beranda">
              <window.TweakRadio label="Varian Beranda" value={tweaks.homeVariant}
                options={[{value:'A',label:'A · Editorial'},{value:'B',label:'B · Bold Hero'}]}
                onChange={(v) => setTweak('homeVariant', v)} />
            </window.TweakSection>
            <window.TweakSection label="Identitas Visual">
              <window.TweakColor label="Aksen Utama"
                value={tweaks.accent}
                options={['clay','palm','ochre']}
                onChange={(v) => setTweak('accent', v)} />
              <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                {[['clay','Terakota'],['palm','Hijau'],['ochre','Ochre']].map(([a,l]) => (
                  <button key={a} onClick={() => setTweak('accent', a)}
                    style={{
                      flex: 1, padding: '8px', borderRadius: 8, fontSize: 12,
                      background: tweaks.accent === a ? 'var(--ink-900)' : 'var(--cream-100)',
                      color: tweaks.accent === a ? 'var(--cream-50)' : 'var(--ink-700)',
                      border: '1px solid var(--line)', fontWeight: 500, cursor: 'pointer',
                    }}>{l}</button>
                ))}
              </div>
            </window.TweakSection>
            <window.TweakSection label="Debug">
              <window.TweakToggle label="Label PBI" value={tweaks.showPbiTags}
                onChange={(v) => setTweak('showPbiTags', v)} />
            </window.TweakSection>
            <window.TweakSection label="Lompat ke Halaman">
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
                {[
                  ['home','Beranda'],['catalog','Katalog'],
                  ['product-detail','Detail Produk'],['service-detail','Detail Jasa'],
                  ['business','Profil Usaha'],['admin-dashboard','Admin Dashboard'],
                  ['admin-master-business','Master UMKM'],['admin-edit','Tambah/Edit'],
                ].map(([r,l]) => (
                  <button key={r} onClick={() => window.navigate(r, r === 'admin-edit' ? {entity:'business'} : r === 'product-detail' ? {id:'p1'} : r === 'service-detail' ? {id:'s1'} : r === 'business' ? {id:'b1'} : {})}
                    style={{
                      padding: '8px', fontSize: 11, borderRadius: 6,
                      background: route === r ? 'var(--clay-600)' : 'var(--cream-100)',
                      color: route === r ? 'var(--cream-50)' : 'var(--ink-700)',
                      textAlign: 'left', fontWeight: 500, cursor: 'pointer', border: '1px solid var(--line)',
                    }}>{l}</button>
                ))}
              </div>
            </window.TweakSection>
          </window.TweaksPanel>
        </div>
      );

      function setTweak(key, value) {
        setTweaks(t => {
          const next = typeof key === 'object' ? { ...t, ...key } : { ...t, [key]: value };
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
          return next;
        });
      }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  
</script>
</body>
</html>
